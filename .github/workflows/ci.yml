name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── Unit Tests ───────────────────────────────────────────────────────────
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: ./node_modules/.bin/prisma generate

      - name: Run unit tests
        run: npm test -- --reporter=verbose

  # ─── E2E Tests ────────────────────────────────────────────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: cravings_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U testuser -d cravings_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://testuser:testpass@localhost:5432/cravings_test
      AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
      AUTH_GOOGLE_ID: ci-dummy-google-id
      AUTH_GOOGLE_SECRET: ci-dummy-google-secret
      AUTH_TEST_MODE: "true"
      AUTH_URL: http://localhost:3000
      AUTH_TRUST_HOST: "true"
      PLAYWRIGHT_BASE_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: ./node_modules/.bin/prisma generate

      - name: Push schema to test database
        run: ./node_modules/.bin/prisma db push --skip-generate

      - name: Seed trivia questions
        run: ./node_modules/.bin/ts-node --compiler-options '{"module":"CommonJS"}' prisma/seed.ts

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Build Next.js app
        run: ./node_modules/.bin/next build

      - name: Start production server
        run: npm start &

      - name: Wait for server
        run: npx wait-on http://localhost:3000 --timeout 30000

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
